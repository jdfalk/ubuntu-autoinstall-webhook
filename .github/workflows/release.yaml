name: Build, Release, and Attest

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types: [created]

permissions:
  actions: write
  attestations: write # Required for Sigstore Cosign
  contents: write
  packages: write
  id-token: write # Required for Sigstore Cosign

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        arch: [amd64, arm64]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js environment
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "lts/*"
          check-latest: true
          cache: "npm"
          cache-dependency-path: |
            viewer-app/package-lock.json
            viewer-app/package.json
      - run: npm install --prefix viewer-app
      - run: npm ci --prefix viewer-app
      - run: npm run build --prefix viewer-app

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ">=1.24"
          cache: true
          cache-dependency-path: |
            "**/*.sum"
            viewer-app/package-lock.json
            viewer-app/package.json

      - name: Install Dependencies
        run: go mod tidy

      - name: Generate Mocks
        run: go generate ./...

      # - name: Golangci-lint
      #   uses: golangci/golangci-lint-action@v6.5.0

      - name: Run Tests
        run: go test -v ./...

      - name: Generate Code Coverage
        run: |
          go test ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
          go tool cover -html=./cover.out -o coverage.html

      - name: Build Binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.arch }} go build -o dist/webhook-${{ matrix.goos }}-${{ matrix.arch }}-${{ github.run_id }} .

      - name: Upload Binaries as Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.arch }}-${{ github.run_id }}
          path: dist/
          if-no-files-found: ignore

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Built Binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Build
        run: echo ${{ github.sha }} > Release.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
        with:
          cosign-release: "v2.4.3"

      - name: Install Syft (for SBOM)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM for Binaries
        run: |
          mkdir -p sbom
          for file in dist/*; do
            syft $file -o spdx-json > sbom/$(basename $file).spdx.json
          done

      - name: Publish Release Binaries
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dist/*
            Release.txt

      - name: Sign Binaries with Cosign
        run: |
          for file in dist/*; do
            cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY $file
          done
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      # - name: Attest Binaries with Provenance
      #   run: |
      #     for file in dist/*; do
      #       cosign attest-blob --predicate provenance.json --type custom --yes --key env://COSIGN_PRIVATE_KEY $file
      #     done
      #   env:
      #     COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      #     COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Attest Binaries with SBOM
        run: |
          for sbom in sbom/*; do
            binary_name=$(basename $sbom .spdx.json)
            cosign attest-blob --predicate $sbom --type spdx --yes --key env://COSIGN_PRIVATE_KEY dist/$binary_name
          done
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4 # v2.2.0
        with:
          subject-path: "dist/*"

  docker:
    name: Build and Push Multi-Arch Docker Image
    needs: release
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.kaniko_build.outputs.digest }}
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96
        id: metadata
        with:
          images: ghcr.io/${{ github.repository }}

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Built Binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - run: chmod +x dist/webhook-linux-${{ matrix.arch }}*

      - name: Kaniko Build
        id: kaniko_build
        uses: int128/kaniko-action@51bb83134884a45cd42b44964c4f7be46256ec79 # v1.49.0
        with:
          executor: "gcr.io/kaniko-project/executor:debug"
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ubuntu-autoinstall-webhook:${{ github.sha }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/ubuntu-autoinstall-webhook:latest-${{ github.sha }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/ubuntu-autoinstall-webhook:latest-${{ github.ref_name }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/ubuntu-autoinstall-webhook:latest-${{ matrix.arch }}
            ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache: true
          cache-repository: ghcr.io/${{ github.repository }}/cache
          build-args: |
            TARGETARCH=${{ matrix.arch }}
          # file: Dockerfile
          kaniko-args: |
            --custom-platform=linux/${{ matrix.arch }}

  manifest:
    name: Create and Push Docker Manifest
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Create and Push Multi-Arch Manifest
        run: |
          export IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/ubuntu-autoinstall-webhook"
          export TAG="latest"

          docker manifest create $IMAGE_NAME:$TAG \
            --amend $IMAGE_NAME:$TAG-${{ github.sha }}-amd64 \
            --amend $IMAGE_NAME:$TAG-${{ github.sha }}-arm64

          docker manifest push $IMAGE_NAME:$TAG

          docker manifest create $IMAGE_NAME:$TAG-${{ github.sha }} \
            --amend $IMAGE_NAME:$TAG-${{ github.sha }}-amd64 \
            --amend $IMAGE_NAME:$TAG-${{ github.sha }}-arm64

          docker manifest push $IMAGE_NAME:$TAG-${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      # - name: Generate Attestation for Release Docker Image
      #   run: |
      #     echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io --username $GITHUB_ACTOR --password-stdin
      #     echo "attestation for amd64 image"
      #     IMAGE_NAME="ghcr.io/jdfalk/ubuntu-autoinstall-webhook:latest-${{ github.sha }}-amd64"
      #     # Pull the image to ensure it's available locally
      #     docker pull $IMAGE_NAME
      #     IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME)
      #     cosign attest --type spdx --yes --key env://COSIGN_PRIVATE_KEY $IMAGE_DIGEST
      #     echo "attestation for arm64 image"
      #     IMAGE_NAME="ghcr.io/jdfalk/ubuntu-autoinstall-webhook:latest-${{ github.sha }}-arm64"
      #     docker pull $IMAGE_NAME
      #     IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME)
      #     cosign attest --type spdx --yes --key env://COSIGN_PRIVATE_KEY $IMAGE_DIGEST
      #   env:
      #     COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      #     COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Attest Container Build Provenance
        uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4 # v2.2.0
        with:
          subject-name: "ghcr.io/${{ github.repository_owner }}/ubuntu-autoinstall-webhook"
          subject-digest: ${{ needs.docker.outputs.digest }} # Use the digest from the Kaniko build step
          push-to-registry: true
